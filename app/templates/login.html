{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-20 bg-gray-50">
    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black italic uppercase tracking-tight leading-none">Vogue's Wear</h1>
            <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400 mt-2">Admin Access</p>
            <div class="h-1 w-16 bg-black mx-auto mt-3"></div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for category, message in messages %}
            <div class="mb-6 p-4 rounded-2xl text-sm font-medium
                {% if category == 'success' %}bg-green-50 text-green-800 border border-green-200
                {% elif category == 'danger' %}bg-red-50 text-red-800 border border-red-200
                {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
                {{ message }}
            </div>
            {% endfor %}{% endif %}
        {% endwith %}

        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <h2 class="font-black text-xl uppercase tracking-tight mb-6">Sign In</h2>

            <form action="{{ url_for('main.login') }}" method="POST" class="space-y-5">

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Username</label>
                    <input type="text" name="username" required autofocus
                           placeholder="Enter your username"
                           class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:border-black transition">
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Password</label>
                    <input type="password" name="password" required
                           placeholder="Enter your password"
                           class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:border-black transition">
                </div>

                <button type="submit"
                        class="w-full bg-black text-white font-black text-sm py-4 rounded-2xl uppercase tracking-widest hover:bg-gray-800 transition">
                    Sign In →
                </button>

            </form>
        </div>

        <p class="text-center text-xs text-gray-400 mt-6">
            <a href="{{ url_for('main.index') }}" class="hover:text-black transition">← Back to Store</a>
        </p>

    </div>
</div>
{% endblock %}
