<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vogue's Wear | Urban Fashion</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-black antialiased">

    <nav class="bg-black text-white py-6 px-4 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="{{ url_for('main.index') }}" class="text-2xl font-black italic tracking-tighter uppercase">
                VOGUE'S WEAR
            </a>
            
            <div class="hidden md:flex space-x-8 items-center">
                <a href="{{ url_for('main.index') }}" class="text-[10px] font-bold uppercase tracking-widest hover:text-gray-400 transition">Home</a>
                <a href="{{ url_for('main.shop') }}" class="text-[10px] font-bold uppercase tracking-widest hover:text-gray-400 transition">Shop</a>
                
                <a href="/admin/add_product" class="bg-yellow-400 text-black px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-yellow-300 transition flex items-center gap-2">
                    <span>Admin</span>
                    <div class="w-2 h-2 bg-black rounded-full animate-pulse"></div>
                </a>
                
                <div class="relative cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                    {% if session.get('cart') %}
                    <span class="absolute -top-2 -right-2 bg-yellow-400 text-black text-[8px] font-bold px-1.5 py-0.5 rounded-full">
                        {{ session['cart']|length }}
                    </span>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-100 py-12 mt-20">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em]">
                Vogue's Wear &copy; 2026 — Alex Karita — Nairobi, Kenya
            </p>
        </div>
    </footer>

</body>
</html>
