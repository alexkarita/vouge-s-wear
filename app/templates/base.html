<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vogue's Wear — AI Driven Fashion</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* Smooth fade-in for the chat window */
        #chat-window.hidden { display: none; }
        #chat-window { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <nav class="bg-black text-white px-8 py-4 flex justify-between items-center sticky top-0 z-40">
        <a href="/" class="text-2xl font-bold tracking-widest">VOGUE'S WEAR</a>
        <div class="flex gap-8 text-sm uppercase tracking-wider">
            <a href="/" class="hover:text-gray-300">Home</a>
            <a href="/shop" class="hover:text-gray-300">Shop</a>
            <a href="/cart" class="hover:text-gray-300">Cart</a>
        </div>
    </nav>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-900 text-gray-400 text-center py-8 text-sm">
        Vogue's Wear &copy; 2026 — Nairobi, Kenya
    </footer>

    <button id="chat-toggle" class="fixed bottom-6 right-6 bg-black text-white p-4 rounded-full shadow-2xl z-50 hover:scale-110 transition-transform">
        <span id="chat-icon" class="text-xl">💬</span>
    </button>

    <div id="chat-window" class="fixed bottom-24 right-6 w-80 md:w-96 bg-white rounded-2xl shadow-2xl z-50 hidden flex flex-col border border-gray-100 overflow-hidden">
        <div class="bg-black p-4 text-white font-bold flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                <span>AI Stylist</span>
            </div>
            <button onclick="toggleChat()" class="text-gray-400 hover:text-white">✕</button>
        </div>
        
        <div id="chat-messages" class="h-80 overflow-y-auto p-4 space-y-3 text-sm bg-gray-50 flex flex-col">
            <div class="bg-white border p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-gray-700">
                Hi! I'm your Vogue stylist. Need an outfit for an interview, a wedding, or a date? Just ask!
            </div>
        </div>

        <div class="p-3 border-t bg-white flex gap-2">
            <input type="text" id="chat-input" class="flex-1 border border-gray-200 rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black" placeholder="Describe your event...">
            <button id="send-btn" class="bg-black text-white px-4 py-2 rounded-full text-xs font-bold hover:bg-gray-800 transition">Send</button>
        </div>
    </div>
    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');

        function toggleChat() {
            chatWindow.classList.toggle('hidden');
        }

        document.getElementById('chat-toggle').addEventListener('click', toggleChat);

        async function handleSend() {
            const msg = chatInput.value.trim();
            if(!msg) return;

            // 1. Add User Message to UI
            chatMessages.innerHTML += `
                <div class="bg-black text-white p-3 rounded-2xl rounded-tr-none self-end ml-auto max-w-[85%] shadow-md">
                    ${msg}
                </div>`;
            chatInput.value = '';
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // 2. Add "Thinking" indicator
            const loadingId = 'load-' + Date.now();
            chatMessages.innerHTML += `
                <div id="${loadingId}" class="flex gap-1 p-2">
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce"></span>
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
                </div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                // 3. Call your new /api/chat route
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();

                // 4. Remove loader and add Bot Message
                document.getElementById(loadingId).remove();
                chatMessages.innerHTML += `
                    <div class="bg-white border p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-gray-800 leading-relaxed">
                        ${data.response.replace(/\n/g, '<br>')}
                    </div>`;
                chatMessages.scrollTop = chatMessages.scrollHeight;

            } catch (err) {
                document.getElementById(loadingId).innerHTML = '<span class="text-red-500 text-xs">Offline. Try again.</span>';
            }
        }

        document.getElementById('send-btn').addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
